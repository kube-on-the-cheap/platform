---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator-crds
  namespace: flux-system
spec:
  interval: 30m
  timeout: 5m
  releaseName: prometheus-operator-crds
  # CRDs are cluster-scoped; only Helm's release-state Secret lives in this namespace.
  targetNamespace: flux-system
  chart:
    spec:
      chart: prometheus-operator-crds
      version: "~29.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
