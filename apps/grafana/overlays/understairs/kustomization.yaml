apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - alloy-token.sops.yaml
configMapGenerator:
  - name: alloy-values
    namespace: flux-system
    files:
      - values.yaml=alloy-values.yaml
configurations:
  - kustomizeconfig.yaml
patches:
  # Remove ExternalSecret from base (understairs uses SOPS-encrypted secrets)
  - patch: |
      $patch: delete
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: alloy-token
    target:
      group: external-secrets.io
      version: v1beta1
      kind: ExternalSecret
      name: alloy-token
