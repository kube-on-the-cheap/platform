---
cluster:
  name: understairs

destinations:
  grafana-cloud-metrics:
    type: prometheus
    url: https://prometheus-prod-24-prod-eu-west-2.grafana.net/api/prom/push
    auth:
      type: basic
      username: "2355589"
  grafana-cloud-logs:
    type: loki
    url: https://logs-prod-012.grafana.net/loki/api/v1/push
    auth:
      type: basic
      username: "1173472"

global:
  scrapeInterval: 90s

# -- Kubernetes observability --

clusterMetrics:
  enabled: true
  collector: alloy-metrics
  kube-state-metrics:
    metricsTuning:
      useDefaultAllowList: false

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
    metricsTuning:
      useIntegrationAllowList: true

annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics
  annotations:
    scrape: prometheus.io/scrape
    metricsPath: prometheus.io/path
    metricsPortNumber: prometheus.io/port

prometheusOperatorObjects:
  enabled: true
  collector: alloy-metrics

clusterEvents:
  enabled: true
  collector: alloy-singleton

podLogsViaLoki:
  enabled: true
  collector: alloy-daemonset

# Talos Linux has no systemd-journald (/var/log/journal).
nodeLogs:
  enabled: false

# -- Self-monitoring --

integrations:
  alloy:
    instances:
      - name: alloy-metrics
        labelSelectors:
          app.kubernetes.io/name: alloy-metrics
        metrics:
          tuning:
            excludeMetrics:
              - alloy_component_dependencies_wait_seconds_bucket
              - alloy_component_evaluation_seconds_bucket
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name: [alloy-daemonset, alloy-singleton]
        metrics:
          tuning:
            useDefaultAllowList: false
            includeMetrics:
              - alloy_build_info

# -- Collectors --

collectors:
  alloy-metrics:
    enabled: true
    presets: [clustered, statefulset]
    controller:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
  alloy-daemonset:
    enabled: true
    presets: [daemonset, filesystem-log-reader]
  alloy-singleton:
    enabled: true
    presets: [singleton]
    controller:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
    extraService:
      enabled: true
    alloy:
      extraPorts:
        - name: syslog
          port: 1514
          targetPort: 1514
          protocol: TCP
    extraConfig: |-
      // Syslog receiver for network devices (OpenWRT, switches, APs)
      loki.source.syslog "network_devices" {
        listener {
          address  = "0.0.0.0:1514"
          protocol = "tcp"
          labels   = {
            job = "syslog/network-devices",
          }
        }
        forward_to = [loki.write.grafana_cloud_logs.receiver]
      }

      // Prometheus scrape for OpenWRT node exporters
      prometheus.scrape "openwrt" {
        targets = [
          {"__address__" = "192.168.20.5:9100", "instance" = "ap-01"},
          {"__address__" = "192.168.20.6:9100", "instance" = "ap-02"},
          {"__address__" = "192.168.20.7:9100", "instance" = "ap-03"},
        ]
        scrape_interval = "30s"
        forward_to      = [prometheus.remote_write.grafana_cloud_metrics.receiver]
      }

telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true
