---
cluster:
  name: freeloader

destinations:
  grafana-cloud-metrics:
    type: prometheus
    url: https://prometheus-prod-24-prod-eu-west-2.grafana.net/api/prom/push
    auth:
      type: basic
      username: "2355589"
  grafana-cloud-logs:
    type: loki
    url: https://logs-prod-012.grafana.net/loki/api/v1/push
    auth:
      type: basic
      username: "1173472"

global:
  scrapeInterval: 90s

# -- Kubernetes observability --

clusterMetrics:
  enabled: true
  collector: alloy-metrics
  kube-state-metrics:
    metricsTuning:
      useDefaultAllowList: false

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
    metricsTuning:
      useIntegrationAllowList: true

annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics
  annotations:
    scrape: prometheus.io/scrape
    metricsPath: prometheus.io/path
    metricsPortNumber: prometheus.io/port

prometheusOperatorObjects:
  enabled: true
  collector: alloy-metrics

clusterEvents:
  enabled: true
  collector: alloy-singleton

podLogsViaLoki:
  enabled: true
  collector: alloy-daemonset

# OCI nodes have systemd journals; node logs ship via the daemonset collector.
nodeLogs:
  enabled: true
  collector: alloy-daemonset

# -- Self-monitoring --

integrations:
  alloy:
    instances:
      - name: alloy-metrics
        labelSelectors:
          app.kubernetes.io/name: alloy-metrics
        metrics:
          tuning:
            excludeMetrics:
              - alloy_component_dependencies_wait_seconds_bucket
              - alloy_component_evaluation_seconds_bucket
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name: [alloy-daemonset, alloy-singleton]
        metrics:
          tuning:
            useDefaultAllowList: false
            includeMetrics:
              - alloy_build_info

# -- Collectors --

collectors:
  alloy-metrics:
    enabled: true
    presets: [clustered, statefulset]
  alloy-daemonset:
    enabled: true
    presets: [daemonset, filesystem-log-reader]
  alloy-singleton:
    enabled: true
    presets: [singleton]

telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true
