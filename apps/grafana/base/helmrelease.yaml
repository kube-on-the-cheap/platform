---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: flux-system
spec:
  interval: 30m
  timeout: 5m
  releaseName: alloy
  targetNamespace: grafana
  chart:
    spec:
      chart: k8s-monitoring
      version: "~4.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  valuesFrom:
    - kind: ConfigMap
      name: alloy-values
    - kind: Secret
      name: alloy-token
      targetPath: destinations.grafana-cloud-metrics.auth.password
      valuesKey: alloy-token
    - kind: Secret
      name: alloy-token
      targetPath: destinations.grafana-cloud-logs.auth.password
      valuesKey: alloy-token
