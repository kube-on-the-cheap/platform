---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 15m0s
  sourceRef:
    kind: GitRepository
    name: platform
  path: ./apps/grafana/overlays/understairs
  prune: true
  wait: true
  timeout: 10m0s
  decryption:
    provider: sops
