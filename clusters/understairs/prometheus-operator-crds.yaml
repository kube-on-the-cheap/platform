---
# INFO: Installs the same CRDs previously bundled by k8s-monitoring v2. On first
#       reconcile, Helm may need --take-ownership if CRDs aren't already managed.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prometheus-operator-crds
  namespace: flux-system
spec:
  interval: 15m0s
  sourceRef:
    kind: GitRepository
    name: platform
  path: ./apps/prometheus-operator-crds/base
  prune: true
  wait: true
  timeout: 20m0s
